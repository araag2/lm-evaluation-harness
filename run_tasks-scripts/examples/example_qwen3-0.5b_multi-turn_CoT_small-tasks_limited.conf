# ================================================
# Example Configuration: Qwen3-0.5B Multi-turn CoT Small Tasks (Limited)
# ================================================
# Usage: ./run_multi_turn.sh --config examples/example_qwen3-0.5b_multi-turn_CoT_small-tasks_limited.conf

# Use the tiny Qwen3-0.5B model for fast testing
REASONING_MODELS=("$MODEL_QWEN3_0_5B")
ANSWERING_MODELS=("$MODEL_QWEN3_0_5B")

# Small subset of task pairs for quick testing
TASK_PAIRS=("${SMALL_TASK_PAIRS[@]}")

# Multi-turn CoT mode
MODE="multi-turn_CoT"

# Runtime settings with limit
OUTPUT_BASE="./outputs/opt125m_multi-turn_CoT_small-tasks_limited"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
LIMIT=3