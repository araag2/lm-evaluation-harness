# ================================================
# Example Configuration: Quick Test Run
# ================================================
# Usage: ./run_eval.sh --config examples/example_quick_run.conf

# Use the tiny model for testing
MODELS=("$MODEL_OPT_125M")

# Test on a small subset of tasks
TASKS=(
    "MedQA"
    "MedMCQA"
)

# Only test 0-shot mode
MODES=("0-shot")

# Runtime settings
OUTPUT_BASE="./outputs/quick_test"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
