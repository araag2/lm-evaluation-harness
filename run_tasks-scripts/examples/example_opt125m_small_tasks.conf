# ================================================
# Example Configuration: OPT-125M with Small Tasks (Limited)
# ================================================
# Usage: ./run_eval.sh --config examples/example_opt125m_small_tasks.conf

# Use the tiny OPT-125M model for fast testing
MODELS=("$MODEL_OPT_125M")

# Small subset of tasks for quick testing
TASKS=("${SMALL_TASKS[@]}")

# Test both modes
MODES=("0-shot" "CoT")

# Runtime settings with limit
OUTPUT_BASE="./outputs/opt125m_small_tasks_limited"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
LIMIT=3