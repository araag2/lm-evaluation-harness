# ================================================
# Example Configuration: OPT-125M with All Tasks CoT (Limited)
# ================================================
# Usage: ./run_eval.sh --config examples/example_opt125m_all_tasks_limited.conf

# Use the tiny OPT-125M model for fast testing
MODELS=("$MODEL_OPT_125M")

# All available tasks (from ALL_TASKS group) - using CoT mode for compatibility
TASKS=("${ALL_TASKS[@]}")

# CoT mode only (more compatible with complex tasks like RCT_Summary)
MODES=("CoT")

# Runtime settings with limit
OUTPUT_BASE="./outputs/opt125m_all_tasks_cot_limited"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
LIMIT=3