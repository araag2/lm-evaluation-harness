# ================================================
# Example Configuration: Self-Refine CoT Experimental — All Models, Small Tasks
# ================================================
# Runs mode=self-refine_CoT_experimental on the SMALL task set for every model.
# Results are captured at checkpoints 1, 5, and 10 refinement iterations.
# stop_on_degradation is enabled by default.
#
# Usage:
#   # Full run (all models, small tasks, default settings):
#   ./run_self_refine_experimental.sh \
#       --config examples/new_experiments/self_refine_experimental_all_models_small-tasks.conf
#
#   # Override to disable early stopping:
#   ./run_self_refine_experimental.sh \
#       --config examples/new_experiments/self_refine_experimental_all_models_small-tasks.conf \
#       --no-degradation
#
#   # Quick smoke test (1 sample per task, tiny model):
#   ./run_self_refine_experimental.sh \
#       --config examples/new_experiments/self_refine_experimental_all_models_small-tasks.conf \
#       --model qwen2-0.5b --limit 10
#
#   # Extract results after the run:
#   ./extract_results.sh \
#       --input  "../outputs/post_revamp_bench/self-refine_CoT_experimental" \
#       --output "../outputs/post_revamp_bench/results" \
#       --name   "self_refine_experimental_small-tasks"
# ================================================

# ── Models ───────────────────────────────────────────────────────────────────
# All models are used by default (MODELS_ALL = TINY + 4B + 8B + MEDICAL).
# Comment this out and uncomment a specific group / individual model to restrict.
REASONING_MODELS=(
    "$MODEL_QWEN3_8B"
)

ANSWERING_MODELS=(
    "$MODEL_QWEN3_8B"
)

# 8B models only:
# REASONING_MODELS=("${MODELS_8B[@]}")
# ANSWERING_MODELS=("${MODELS_8B[@]}")

# Single model:
# REASONING_MODELS=("$MODEL_QWEN3_8B")
# ANSWERING_MODELS=("$MODEL_QWEN3_8B")

# ── Tasks ────────────────────────────────────────────────────────────────────
# SMALL = MedNLI, MedQA, PubMedQA, NLI4PR (patient-lang), NLI4PR (medical-lang)
TASK_PAIRS=("${SMALL_TASK_PAIRS[@]}")

# ── Self-Refine Experimental Settings ────────────────────────────────────────
# Checkpoints are fixed at iterations 1, 5, 10 (defined in the Python module).
# stop_on_degradation is ON by default for this mode; set NO_DEGRADATION=true to disable.
NO_DEGRADATION=false

# Cap feedback generation to this many tokens (keeps feedback focused and fast).
FEEDBACK_MAX_TOKENS=1000

# ── Output ───────────────────────────────────────────────────────────────────
OUTPUT_BASE="../outputs/post_revamp_bench"

# ── Runtime ──────────────────────────────────────────────────────────────────
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"

# Uncomment to restrict the number of evaluated documents per task (for testing):
# LIMIT="50"
LIMIT=""
