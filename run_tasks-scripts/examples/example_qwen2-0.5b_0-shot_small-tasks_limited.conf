# ================================================
# Example Configuration: Qwen3-0.5B with 0-shot Small Tasks (Limited)
# ================================================
# Usage: ./run_eval.sh --config examples/example_qwen3-0.5b_0-shot_small-tasks_limited.conf

# Use the tiny Qwen3-0.5B model for fast testing
MODELS=("$MODEL_QWEN2_0_5B")

# Small subset of tasks for quick testing
TASKS=("${SMALL_TASKS[@]}")

# Only 0-shot mode
MODES=("0-shot")

# Runtime settings with limit
OUTPUT_BASE="../outputs/qwen2-0.5b_0-shot_small-tasks_limited"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
LIMIT=3