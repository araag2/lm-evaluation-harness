# ================================================
# Example Configuration: All 8B Models with 0-shot All Tasks
# ================================================
# Usage: ./run_single_turn.sh --config examples/OpenCTEval_Bench/all-8b-models_0-shot_all-tasks.conf

# Use all 8B models for evaluation
MODELS=(
    "$MODEL_GEMMA_8B"
    "$MODEL_YI_9B"
)

# Tasks that work well with 0-shot evaluation
TASKS=(
    "TrialPanorama_Arm_Design"
    "TrialPanorama_Eligibility_Criteria_Design"
    "TrialPanorama_Endpoint_Design"
    "TrialPanorama_Evidence_Summarization"
    "TrialPanorama_Study_Screening"
)

# Only 0-shot mode
MODES=("0-shot")

# Runtime settings with limit
OUTPUT_BASE="/user/home/aguimas/data/PhD/Active_Dev/lm-evaluation-harness/outputs/post_revamp_bench"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
TASKS_PER_RUN=2
SEED="0"
USE_TIMESTAMP=true
# Runtime profile
PROFILE="BALANCED_MEM"
