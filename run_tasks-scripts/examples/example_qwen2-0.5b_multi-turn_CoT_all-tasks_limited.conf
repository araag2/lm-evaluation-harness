# ================================================
# Example Configuration: Qwen2-0.5B Multi-turn CoT All Tasks (Limited)
# ================================================
# Usage: ./run_multi_turn.sh --config examples/example_qwen2-0.5b_multi-turn_CoT_all-tasks_limited.conf

# Use the tiny Qwen2-0.5B model for fast testing
REASONING_MODELS=("$MODEL_QWEN2_0_5B")
ANSWERING_MODELS=("$MODEL_QWEN2_0_5B")

# Small subset of task pairs for quick testing
TASK_PAIRS=("${ALL_TASK_PAIRS[@]}")

# Multi-turn CoT mode
MODE="multi-turn_CoT"

# Runtime settings with limit
OUTPUT_BASE="../outputs/qwen2-0.5b_multi-turn_CoT_all-tasks_limited"
CUDA_DEVICES="5"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
LIMIT=2