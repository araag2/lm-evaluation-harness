# ================================================
# Example Configuration: Comprehensive Analysis
# ================================================
# Run evaluation and extract all results
# Usage: 
#   1. ./run_eval.sh --config examples/example_with_analysis.conf
#   2. ./extract_results.sh --input ./outputs/comprehensive_analysis
#   3. ./extract_errors.sh --input ./outputs/comprehensive_analysis

# Select models
MODELS=(
    "$MODEL_QWEN3_4B"
    "$MODEL_LLAMA_8B"
)

# Select tasks
TASKS=(
    "MedQA"
    "MedMCQA"
    "PubMedQA"
)

# All inference modes
MODES=("0-shot" "CoT")

# Runtime settings
OUTPUT_BASE="./outputs/comprehensive_analysis"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="42"
USE_TIMESTAMP=true
VERBOSE=true
