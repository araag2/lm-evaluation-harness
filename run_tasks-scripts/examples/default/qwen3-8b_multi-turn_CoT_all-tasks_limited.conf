# ================================================
# Example Configuration: Qwen3-8B Multi-turn CoT All Tasks (Limited)
# ================================================
# Usage: ./run_multi_turn.sh --config examples/default/qwen3-8b_multi-turn_CoT_all-tasks_limited.conf

# Use the tiny Qwen3-8B model for fast testing
REASONING_MODELS=("$MODEL_QWEN3_8B")
ANSWERING_MODELS=("$MODEL_QWEN3_8B")

# Small subset of task pairs for quick testing
TASK_PAIRS=("${ALL_TASK_PAIRS[@]}")

# Multi-turn CoT mode
MODE="multi-turn_CoT"

# Runtime settings with limit
OUTPUT_BASE="../outputs/qwen3-8b_multi-turn_CoT_all-tasks_limited"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
LIMIT=1