# ================================================
# Example Configuration: Qwen3-0.5B with 0-shot All Tasks (Limited)
# ================================================
# Usage: ./run_eval.sh --config examples/default/qwen2-0.5b_0-shot_all-tasks_limited.conf

# Use the tiny Qwen3-0.5B model for fast testing
MODELS=("$MODEL_QWEN2_0_5B")

# Tasks that work well with 0-shot evaluation
TASKS=(
    "MedQA"
    "MedMCQA"
    "MedNLI"
    "PubMedQA"
    "Evidence_Inference_v2"
    "NLI4PR"
    "HINT"
    "Trial_Meta_Analysis_type"
    "TREC_CDS_balanced"
    "TREC_Prec-Med_balanced"
    "TREC_CT_balanced"
    "SemEval_NLI4CT"
    "TrialBench_adverse_event_prediction"
    "TrialBench_mortality_rate_prediction"
    "TrialBench_patient_dropout_prediction"
    "TrialBench_trial_approval_prediction"
    "TrialBench_trial_failure_reason_identification"
    "TrialBench_trial_duration_prediction"
    "TrialPanorama_Arm_Design"
    "TrialPanorama_Eligibility_Criteria_Design"
    "TrialPanorama_Endpoint_Design"
    "TrialPanorama_Evidence_Summarization"
    "TrialPanorama_Study_Screening"
)

# Only 0-shot mode
MODES=("0-shot")

# Runtime settings with limit
OUTPUT_BASE="../outputs/qwen2-0.5b_0-shot_all_tasks_limited"
CUDA_DEVICES="2"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
LIMIT=1