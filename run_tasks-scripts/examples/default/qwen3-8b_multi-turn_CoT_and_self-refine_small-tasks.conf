# ================================================
# Example Configuration: Qwen3-8B Multi-turn CoT + Self-Refine CoT — Small Tasks (No Limit)
# ================================================
# Runs multi-turn_CoT and self-refine_CoT back-to-back on the small task set,
# then extracts results for both into a shared output directory.
#
# Usage:
#   Step 1 — multi-turn CoT:
#     ./run_multi_turn.sh --config examples/default/qwen3-8b_multi-turn_CoT+self-refine_small-tasks.conf
#
#   Step 2 — self-refine CoT (override MODE on the same script):
#     ./run_multi_turn.sh --config examples/default/qwen3-8b_multi-turn_CoT+self-refine_small-tasks.conf --mode self-refine_CoT
#
#   Step 3 — extract results for both runs:
#     ./extract_results.sh \
#         --input-list "../outputs/qwen3-8b_multi-turn_CoT+self-refine_small-tasks/multi-turn_CoT,\
# ../outputs/qwen3-8b_multi-turn_CoT+self-refine_small-tasks/self-refine_CoT" \
#         --output  "../outputs/qwen3-8b_multi-turn_CoT+self-refine_small-tasks/results" \
#         --name    "qwen3-8b_CoT_vs_self-refine_small-tasks"
# ================================================

# Model — same for reasoning and answering
REASONING_MODELS=("$MODEL_QWEN3_8B")
ANSWERING_MODELS=("$MODEL_QWEN3_8B")

# Small task subset (MedNLI, MedQA, PubMedQA, NLI4PR x2)
TASK_PAIRS=("${SMALL_TASK_PAIRS[@]}")

# Default mode — override with --mode self-refine_CoT for the second run
MODE="multi-turn_CoT"

# Shared output root; each mode gets its own sub-folder automatically
OUTPUT_BASE="../outputs/qwen3-8b_multi-turn_CoT+self-refine_small-tasks"

# Runtime settings — no limit (full dataset)
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=false
LIMIT=""

# Runtime profile
PROFILE="BALANCED_MEM"
