# ================================================
# Example Configuration: Qwen3-0.5B Multi-turn CoT-SC Small Tasks (Limited)
# ================================================
# Usage: ./run_multi_turn.sh --config examples/default/qwen2-0.5b_multi-turn_CoT-SC_small-tasks_limited.conf

# Use the tiny Qwen3-0.5B model for fast testing
REASONING_MODELS=("$MODEL_QWEN2_0_5B")
ANSWERING_MODELS=("$MODEL_QWEN2_0_5B")

# Small subset of task pairs for quick testing
TASK_PAIRS=("${SMALL_TASK_PAIRS[@]}")

# Multi-turn CoT-SC mode (self-consistency)
MODE="multi-turn_CoT-SC"

# Runtime settings with limit
OUTPUT_BASE="../outputs/qwen2-0.5b_multi-turn_CoT-SC_small-tasks_limited"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
LIMIT=3