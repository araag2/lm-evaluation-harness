# ================================================
# Example Configuration: Qwen3-0.5B Cross-Consistency Small Tasks (Limited)
# ================================================
# Usage: ./run_multi_turn.sh --config examples/default/qwen2-0.5b_cross-consistency_small-tasks_limited.conf

# Use two tiny models for cross-consistency verification
REASONING_MODELS=("$MODEL_QWEN2_0_5B" "$MODEL_GEMMA_270M")
ANSWERING_MODELS=("$MODEL_QWEN2_0_5B" "$MODEL_GEMMA_270M")

# Task pairs for cross-consistency (SMALL_TASK_PAIRS or explicit list)
TASK_PAIRS=("${SMALL_TASK_PAIRS[@]}")

# Runtime settings with limit
MODE="cross-consistency"
OUTPUT_BASE="../outputs/qwen2-0.5b_cross-consistency_small-tasks_limited"
SEED="0"
LIMIT=3