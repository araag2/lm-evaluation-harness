# ================================================
# Example Configuration: Multi-Turn CoT
# ================================================
# Usage: ./run_multi_turn.sh --config examples/default/multi_turn.conf

# Evaluation mode
MODE="multi-turn_CoT"

# Models (same for reasoning and answering)
REASONING_MODELS=(
    "$MODEL_QWEN3_4B"
    "$MODEL_LLAMA_8B"
)
ANSWERING_MODELS=(
    "$MODEL_QWEN3_4B"
    "$MODEL_LLAMA_8B"
)

# Task pairs
TASK_PAIRS=(
    "MedQA:CoT|MedQA:0-shot"
    "MedMCQA:CoT|MedMCQA:0-shot"
    "PubMedQA:CoT|PubMedQA:0-shot"
)

# Runtime settings
OUTPUT_BASE="../outputs/multi_turn_cot"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
