# ================================================
# Example Configuration: Cross-Consistency with Tiny Models
# ================================================
# Usage: ./run_cross_consistency.sh --config examples/default/cross_consistency_tiny.conf

# Use tiny models for fast testing
REASONING_MODELS=(
    "$MODEL_QWEN2_0_5B" 
    "$MODEL_GEMMA_270M"
)

ANSWERING_MODELS=(
    "$MODEL_QWEN2_0_5B" 
    "$MODEL_GEMMA_270M"
)

# Task pair for cross-consistency
REASONING_TASK="MedQA:CoT"
ANSWERING_TASK="MedQA:0-shot"

# Runtime settings
OUTPUT_BASE="../outputs/cross_consistency_tiny"
LIMIT=10
SEED="0"