# ================================================
# Example Configuration: Cross-Consistency with Tiny Models
# ================================================
# Usage: ./run_multi_turn.sh --config examples/default/cross_consistency_tiny.conf

# Use tiny models for fast testing
REASONING_MODELS=(
    "$MODEL_QWEN2_0_5B" 
    "$MODEL_GEMMA_270M"
)

ANSWERING_MODELS=(
    "$MODEL_QWEN2_0_5B" 
    "$MODEL_GEMMA_270M"
)

# Task pairs for cross-consistency
TASK_PAIRS=("MedQA:CoT|MedQA:0-shot")

# Runtime settings
MODE="cross-consistency"
OUTPUT_BASE="../outputs/cross_consistency_tiny"
LIMIT=10
SEED="0"
# Runtime profile
PROFILE="BALANCED_MEM"
