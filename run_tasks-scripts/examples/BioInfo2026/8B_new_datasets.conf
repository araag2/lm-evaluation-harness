# ================================================
# Example Configuration: All 8B Models with Multi-turn CoT All Tasks
# ================================================
# Usage: ./run_multi_turn.sh --config examples/OpenCTEval_Bench/all-8b-models_multi-turn_CoT_all-tasks.conf

# Use all 8B models for evaluation
REASONING_MODELS=(
    "$MODEL_QWEN3_8B"
)

ANSWERING_MODELS=(
    "$MODEL_QWEN3_8B"
)

# Small subset of task pairs for quick testing
TASK_PAIRS=(
    "Consort_QA:CoT|Consort_QA:0-shot"
    "Interventions_EBM_NLP_CoT|Interventions_EBM_NLP_0-shot"
    "Outcomes_EBM_NLP_CoT|Outcomes_EBM_NLP_0-shot"
    "Participants_EBM_NLP_CoT|Participants_EBM_NLP_0-shot"
)

# Multi-turn CoT mode
MODE="multi-turn_CoT"

# Runtime settings with limit
OUTPUT_BASE="/user/home/aguimas/data/PhD/Active_Dev/lm-evaluation-harness/outputs/BioInfo2026"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
TASK_PAIRS_PER_RUN=1
SEED="0"
# Runtime profile
PROFILE="BALANCED_MEM"