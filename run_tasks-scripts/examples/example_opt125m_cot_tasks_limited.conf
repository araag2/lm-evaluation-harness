# ================================================
# Example Configuration: OPT-125M with CoT Compatible Tasks (Limited)
# ================================================
# Usage: ./run_eval.sh --config examples/example_opt125m_cot_tasks_limited.conf

# Use the tiny OPT-125M model for fast testing
MODELS=("$MODEL_OPT_125M")

# Tasks that work well with CoT evaluation (including summarization and complex reasoning)
TASKS=(
    "MedQA"
    "MedMCQA"
    "MedNLI"
    "PubMedQA"
    "Evidence_Inference_v2"
    "NLI4PR"
    "HINT"
    "Trial_Meta_Analysis_type"
    "Trial_Meta_Analysis_binary"
    "Trial_Meta_Analysis_continuous"
    "TREC_CDS"
    "TREC_CDS_balanced"
    "TREC_Prec-Med"
    "TREC_Prec-Med_balanced"
    "TREC_CT"
    "TREC_CT_balanced"
    "SemEval_NLI4CT"
    "TrialBench_adverse_event_prediction"
    "TrialBench_mortality_rate_prediction"
    "TrialBench_patient_dropout_prediction"
    "TrialBench_trial_approval_prediction"
    "TrialBench_trial_failure_reason_identification"
    "TrialBench_trial_duration_prediction"
    "TrialPanorama_Arm_Design"
    "TrialPanorama_Eligibility_Criteria_Design"
    "TrialPanorama_Endpoint_Design"
    "TrialPanorama_Evidence_Summarization"
    "TrialPanorama_Study_Screening"
    "RCT_Summary"
)

# Only CoT mode
MODES=("CoT")

# Runtime settings with limit
OUTPUT_BASE="./outputs/opt125m_cot_tasks_limited"
CUDA_DEVICES="0"
BATCH_SIZE="auto"
SEED="0"
USE_TIMESTAMP=true
LIMIT=3