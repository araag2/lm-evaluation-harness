# ================================================
# Model Configuration File
# ================================================
# Define model presets for easy selection
# Format: PRESET_NAME="pretrained=...,max_length=...,gpu_memory_utilization=...,..."

# Tiny Models (for testing)
MODEL_QWEN2_0_5B="pretrained=Qwen/Qwen2-0.5B-Instruct"
MODEL_GEMMA_270M="pretrained=google/gemma-3-270m-it"

# 4B Models
MODEL_QWEN3_4B="pretrained=Qwen/Qwen3-4B-Instruct-2507,enable_prefix_caching=True"
MODEL_GEMMA_4B="pretrained=google/gemma-3n-E4B-it,enable_prefix_caching=True"

# 8B Models
MODEL_QWEN3_8B="pretrained=unsloth/Qwen3-8B,enable_prefix_caching=True"
MODEL_LLAMA_8B="pretrained=meta-llama/Llama-3.1-8B-Instruct,enable_prefix_caching=True"
MODEL_DEEPSEEK_8B="pretrained=deepseek-ai/DeepSeek-R1-0528-Qwen3-8B,enable_prefix_caching=True"
MODEL_GEMMA_8B="pretrained=google/gemma-7b,enable_prefix_caching=True"
MODEL_FLEMING_7B="pretrained=UbiquantAI/Fleming-R1-7B,enable_prefix_caching=True"
MODEL_PANACEA_7B="pretrained=linjc16/Panacea-7B-Chat,enable_prefix_caching=True"

# New Models (to be tested)
MODEL_GEMMA-4_8B-IT="pretrained=google/gemma-4-E4B-it,enable_prefix_caching=True"
MODEL_QWEN35_9B="pretrained=Qwen/Qwen3.5-9B,enable_prefix_caching=True"
MODEL_II_MEDICAL_8B="pretrained=Intelligent-Internet/II-Medical-8B,enable_prefix_caching=True"
MODEL_MEDREASON_8B="pretrained=UCSC-VLAA/MedReason-8B,enable_prefix_caching=True"

## Need to Test
MODEL_HUATUO_8B="pretrained=FreedomIntelligence/HuatuoGPT-o1-7B,enable_prefix_caching=True"
MODEL_YI_9B="pretrained=01-ai/Yi-9B,enable_prefix_caching=True"


# Model Groups
MODELS_TINY=(
    "$MODEL_QWEN2_0_5B"
    "$MODEL_GEMMA_270M"
)

MODELS_4B=(
    "$MODEL_QWEN3_4B"
    "$MODEL_GEMMA_4B"
)

MODELS_8B=(
    "$MODEL_QWEN3_8B"
    "$MODEL_LLAMA_8B"
    "$MODEL_DEEPSEEK_8B"
    "$MODEL_GEMMA_8B"
    "$MODEL_YI_9B"
)

MODELS_MEDICAL=(
    "$MODEL_FLEMING_7B"
    "$MODEL_PANACEA_7B"
)

MODELS_ALL=(
    "${MODELS_TINY[@]}"
    "${MODELS_4B[@]}"
    "${MODELS_8B[@]}"
    "${MODELS_MEDICAL[@]}"
)

# Runtime Profiles
# LOW_MEM: lower context length for stability on constrained GPUs.
# BALANCED_MEM: default for most benchmark runs.
# HIGH_MEM: maximize throughput on large-memory GPUs.
PROFILE_LOW_MEM_MAX_LENGTH="4096"
PROFILE_LOW_MEM_GPU_MEM_UTIL="0.80"
PROFILE_LOW_MEM_SWAP_SPACE="16"
PROFILE_LOW_MEM_DTYPE="float16"

PROFILE_BALANCED_MEM_MAX_LENGTH="8192"
PROFILE_BALANCED_MEM_GPU_MEM_UTIL="0.85"
PROFILE_BALANCED_MEM_SWAP_SPACE="12"
PROFILE_BALANCED_MEM_DTYPE="float16"

PROFILE_HIGH_MEM_MAX_LENGTH="8192"
PROFILE_HIGH_MEM_GPU_MEM_UTIL="0.90"
PROFILE_HIGH_MEM_SWAP_SPACE="0"
PROFILE_HIGH_MEM_DTYPE="float16"

# Export Models and Model Groups
export MODEL_QWEN2_0_5B MODEL_GEMMA_270M
export MODEL_QWEN3_4B MODEL_GEMMA_4B
export MODEL_QWEN3_8B MODEL_LLAMA_8B MODEL_DEEPSEEK_8B MODEL_GEMMA_8B MODEL_HUATUO_8B MODEL_YI_9B
export MODEL_FLEMING_7B MODEL_PANACEA_7B

# Export Profiles
export PROFILE_LOW_MEM_MAX_LENGTH PROFILE_LOW_MEM_GPU_MEM_UTIL PROFILE_LOW_MEM_SWAP_SPACE PROFILE_LOW_MEM_DTYPE

export PROFILE_BALANCED_MEM_MAX_LENGTH PROFILE_BALANCED_MEM_GPU_MEM_UTIL PROFILE_BALANCED_MEM_SWAP_SPACE PROFILE_BALANCED_MEM_DTYPE

export PROFILE_HIGH_MEM_MAX_LENGTH PROFILE_HIGH_MEM_GPU_MEM_UTIL PROFILE_HIGH_MEM_SWAP_SPACE PROFILE_HIGH_MEM_DTYPE
