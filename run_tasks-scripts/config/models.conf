# ================================================
# Model Configuration File
# ================================================
# Define model presets for easy selection
# Format: PRESET_NAME="pretrained=...,max_length=...,gpu_memory_utilization=...,..."

# Tiny Models (for testing)
MODEL_QWEN2_0_5B="pretrained=Qwen/Qwen2-0.5B-Instruct,max_length=2048,gpu_memory_utilization=0.2,dtype=float16"
MODEL_GEMMA_270M="pretrained=google/gemma-3-270m-it,max_length=2048,gpu_memory_utilization=0.2,dtype=float16"

# 4B Models
MODEL_QWEN3_4B="pretrained=Qwen/Qwen3-4B-Instruct-2507,max_length=25000,gpu_memory_utilization=0.9,swap_space=8,enable_prefix_caching=True"
MODEL_GEMMA_4B="pretrained=google/gemma-3n-E4B-it,max_length=25000,gpu_memory_utilization=0.9,swap_space=8,enable_prefix_caching=True"

# 8B Models
MODEL_QWEN3_8B="pretrained=unsloth/Qwen3-8B,max_length=25000,gpu_memory_utilization=0.9,dtype=float16,swap_space=8,enable_prefix_caching=True"
MODEL_LLAMA_8B="pretrained=meta-llama/Llama-3.1-8B-Instruct,max_length=25000,gpu_memory_utilization=0.9,dtype=float16,swap_space=8,enable_prefix_caching=True"
MODEL_DEEPSEEK_8B="pretrained=deepseek-ai/DeepSeek-R1-0528-Qwen3-8B,max_length=25000,gpu_memory_utilization=0.9,dtype=float16,swap_space=8,enable_prefix_caching=True"
MODEL_MINISTRAL_8B="pretrained=mistralai/Ministral-8B-Instruct-2410,max_length=25000,gpu_memory_utilization=0.9,dtype=float16,swap_space=8,enable_prefix_caching=True"
MODEL_GEMMA_12B="pretrained=google/gemma-3-12b-it,max_length=25000,gpu_memory_utilization=0.9,swap_space=8,enable_prefix_caching=True"
MODEL_FLEMING_7B="pretrained=UbiquantAI/Fleming-R1-7B,max_length=25000,gpu_memory_utilization=0.9,swap_space=8,enable_prefix_caching=True"
MODEL_PANACEA_7B="pretrained=linjc16/Panacea-7B-Chat,max_length=25000,gpu_memory_utilization=0.9,swap_space=8,enable_prefix_caching=True"

# Model Groups
MODELS_TINY=(
    "$MODEL_QWEN2_0_5B"
    "$MODEL_GEMMA_270M"
)

MODELS_4B=(
    "$MODEL_QWEN3_4B"
    "$MODEL_GEMMA_4B"
)

MODELS_8B=(
    "$MODEL_QWEN3_8B"
    "$MODEL_LLAMA_8B"
    "$MODEL_DEEPSEEK_8B"
    "$MODEL_MINISTRAL_8B"
    "$MODEL_GEMMA_12B"
)

MODELS_MEDICAL=(
    "$MODEL_FLEMING_7B"
    "$MODEL_PANACEA_7B"
)

MODELS_ALL=(
    "${MODELS_TINY[@]}"
    "${MODELS_4B[@]}"
    "${MODELS_8B[@]}"
    "${MODELS_MEDICAL[@]}"
)

# Export all variables
export MODEL_QWEN2_0_5B MODEL_GEMMA_270M
export MODEL_QWEN3_4B MODEL_GEMMA_4B
export MODEL_QWEN3_8B MODEL_LLAMA_8B MODEL_DEEPSEEK_8B MODEL_MINISTRAL_8B MODEL_GEMMA_12B
export MODEL_FLEMING_7B MODEL_PANACEA_7B
