dataset_kwargs:
  trust_remote_code: true
training_split: train
validation_split: dev
test_split: test
doc_to_target: "{{ Label_Regre }}"
output_type: generate_until
generation_kwargs:
  until:
    - "<END>"
    - "<|im_end|>"
    - "<|endoftext|>"
    - "<|end_of_text|>"
    - "<|eot_id|>"
    - "<end_of_turn>"
    - "<eos>"
    - "</s>"
  do_sample: true
  max_gen_toks: 1000
  temperature: 0.7
  top_p: 0.9
  top_k: 50
filter_list:
  - name: "extract_number"
    filter:
    - function: "regex"
      regex_pattern: "(?s:.*)([0-9]+\\.?[0-9]*)"
    - function: "take_first"
metric_list:
  - metric: mean_squared_error
    aggregation: mean
    higher_is_better: false
  - metric: mean_absolute_error
    aggregation: mean
    higher_is_better: false
metadata:
  version: 1.0
