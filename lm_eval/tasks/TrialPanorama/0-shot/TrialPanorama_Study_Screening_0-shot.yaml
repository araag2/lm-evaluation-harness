task: TrialPanorama_Study_Screening_0-shot
dataset_path: araag2/TrialPanorama
dataset_name: study_screening_processed
dataset_kwargs:
  trust_remote_code: true
output_type: multiple_choice
test_split: test
doc_to_text: !function utils.SS_doc_to_text
doc_to_target: "{{ Label }}"
doc_to_choice: ["excluded", "included"] 
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
  - metric: Precision
    aggregation: Precision
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
  - metric: Recall
    aggregation: Recall
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
  - metric: f1
    aggregation: f1
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
metadata:
  version: 1.0