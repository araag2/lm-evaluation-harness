task: TrialPanorama_Study_Screening_CoT_SC
dataset_path: araag2/TrialPanorama
dataset_name: study_screening_processed
dataset_kwargs:
  trust_remote_code: true
training_split: train
validation_split: dev
test_split: test
doc_to_text: !function utils.SS_doc_to_text_reasoning
doc_to_target: "{{ Label }}"
doc_to_choice: ["excluded", "included"]
output_type: generate_until
generation_kwargs:
  until:
    - "<END>"
    - "<|im_end|>"
    - "<|endoftext|>"
    - "<|end_of_text|>"
    - "<|eot_id|>"
    - "<end_of_turn>"
    - "<eos>"
    - "</s>"
  do_sample: true
  max_gen_toks: 1000
  temperature: 0.7
  top_p: 0.9
  top_k: 50
repeats: 11
filter_list:
  - name: "maj@11"
    filter:
    - function: "regex"
      regex_pattern: "(?s:.*)([eE]xcluded|[iI]ncluded)"
    - function: "take_first_k"
      k: 11
    - function: "majority_vote"
    - function: "take_first"
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
  - metric: Precision
    aggregation: Precision
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
  - metric: Recall
    aggregation: Recall
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
  - metric: f1
    aggregation: f1
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
metadata:
  version: 1.0
