task: Trial_Meta_Analysis_type_CoT_SC
tag:
  - chain-of-thought
  - self-consistency
dataset_path: araag2/Trial_Meta-Analysis
dataset_name: processed
dataset_kwargs:
  trust_remote_code: true
validation_split: dev
test_split: test
doc_to_text: !function utils.doc_to_text_reasoning
doc_to_target: "{{ outcome_type }}"
doc_to_choice: ["binary", "continuous"]
output_type: generate_until
generation_kwargs:
  until:
    - "<|im_end|>"
    - "<|endoftext|>"
    - "<|end_of_text|>"
    - "<|eot_id|>"
    - "<end_of_turn>"
    - "<eos>"
    - "</s>"
  do_sample: true
  temperature: 0.7
  top_p: 0.9
  top_k: 50
repeats: 11
filter_list:
  - name: "maj@11"
    filter:
    - function: "regex"
      regex_pattern: "(?s:.*)([Bb]inary|[Cc]ontinuous)"
    - function: "take_first_k"
      k: 11
    - function: "majority_vote"
    - function: "take_last"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
    ignore_numbers: false
metadata:
  version: 1.0
