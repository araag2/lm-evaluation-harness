task: Trial_Meta_Analysis_continuous_CoT_SC
tag:
  - chain-of-thought
  - self-consistency
dataset_path: araag2/Trial_Meta-Analysis
dataset_name: processed_continuous
dataset_kwargs:
  trust_remote_code: true
validation_split: dev
test_split: test
doc_to_text: !function utils.continuous_doc_to_text_reasoning
doc_to_target: "{{ completion_extraction }}"
output_type: generate_until
generation_kwargs:
  until:
    - "<|im_end|>"
    - "<|endoftext|>"
    - "<|end_of_text|>"
    - "<|eot_id|>"
    - "<end_of_turn>"
    - "<eos>"
    - "</s>"
  do_sample: false
  max_gen_toks: 1000
  repetition_penalty: 1.1
repeats: 11
filter_list:
  - name: "take_first@11"
    filter:
    - function: "take_first_k"
      k: 11
    - function: "take_first"
metric_list:
  - metric: partial_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
    ignore_numbers: false
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
    ignore_numbers: false
metadata:
  version: 1.0
